<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWCFIS - 관리자</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="js/components/app-header.js"></script>
</head>
<body>
  <app-header page-title="관리자 페이지"></app-header>
  
  <main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h1>관리자 대시보드</h1>
      <span class="badge badge-admin">ADMINISTRATOR</span>
    </div>

    <!-- Inspection Reports Section -->
    <section class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2>공식 점검 결과 내역</h2>
        <button id="download-excel" class="btn-outline">Excel 다운로드</button>
      </div>
      <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: #666;">점검자가 제출한 공식 점검 결과 목록입니다.</p>
      
      <div id="report-list" style="overflow-x: auto;">
        <!-- Report list populated by JS -->
      </div>
    </section>

    <div class="grid">
      <!-- User Management -->
      <section class="card">
        <h2>계정 권한 관리</h2>
        <p style="margin-bottom: 1rem; font-size: 0.9rem; color: #666;">계정을 생성하고 권한을 부여할 수 있습니다.</p>
        <form id="user-form">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
            <input type="text" id="user-username" placeholder="아이디" required>
            <input type="password" id="user-password" placeholder="비밀번호" required>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
            <input type="text" id="user-name" placeholder="사용자/농장 이름" required>
            <select id="user-role">
              <option value="INSPECTOR">점검자</option>
              <option value="OWNER">농장주</option>
            </select>
          </div>
          <button type="submit" class="btn-primary" style="width: 100%;">계정 생성</button>
        </form>
        
        <div id="user-list" style="margin-top: 1.5rem;">
          <!-- User list populated by JS -->
        </div>
      </section>

      <!-- Item Management -->
      <section class="card">
        <h2>점검 항목 등록</h2>
        <p style="margin-bottom: 1rem; font-size: 0.9rem; color: #666;">시스템에서 사용될 공식 점검 항목을 관리합니다.</p>
        <form id="item-form">
          <input type="text" id="item-title" placeholder="평가 항목 (예: 사육 공간 확보)" required>
          <input type="text" id="item-category" placeholder="카테고리 (예: 사육환경)" required>
          <textarea id="item-desc" placeholder="상세 설명" rows="2" required></textarea>
          <input type="number" id="item-max" placeholder="배점 (최대 점수)" required>
          <button type="submit" class="btn-primary" style="width: 100%;">항목 등록</button>
        </form>
        
        <div id="item-list" style="margin-top: 1.5rem; max-height: 400px; overflow-y: auto;">
          <!-- Item list populated by JS -->
        </div>
      </section>
    </div>
  </main>

  <script type="module">
    import { Storage } from './js/storage.js';

    // Guard
    const currentUser = Storage.getUser();
    if (!currentUser || currentUser.role !== 'ADMIN') {
      alert('관리자 권한이 없습니다.');
      window.location.href = 'index.html';
    }

    const renderUsers = async () => {
      const users = await Storage.getUsers();
      const list = document.getElementById('user-list');
      list.innerHTML = users.map(u => `
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.8rem; border-bottom: 1px solid #eee;">
          <div>
            <strong>${u.name}</strong> (@${u.username})
            <span class="badge ${u.role === 'ADMIN' ? 'badge-admin' : (u.role === 'INSPECTOR' ? 'badge-inspector' : 'badge-owner')}">${u.role}</span>
          </div>
          ${u.role !== 'ADMIN' ? `<button onclick="deleteUser('${u.id}')" style="background: none; color: #d32f2f; padding: 0;">삭제</button>` : ''}
        </div>
      `).join('');
    };

    const renderItems = async () => {
      const items = await Storage.getItems();
      const list = document.getElementById('item-list');
      list.innerHTML = items.map(i => `
        <div style="padding: 1rem; border: 1px solid #eee; border-radius: 8px; margin-bottom: 0.5rem; position: relative;">
          <div style="font-size: 0.8rem; color: var(--primary-color); font-weight: bold;">${i.category}</div>
          <div style="font-weight: bold; margin: 0.2rem 0;">${i.title} (배점: ${i.maxScore})</div>
          <div style="font-size: 0.85rem; color: #666;">${i.description}</div>
          <button onclick="deleteItem('${i.id}')" style="position: absolute; top: 0.5rem; right: 0.5rem; background: none; color: #999; font-size: 0.8rem;">삭제</button>
        </div>
      `).join('');
    };

    const renderReports = async () => {
      const reports = await Storage.getReports();
      const items = await Storage.getItems();
      const list = document.getElementById('report-list');
      
      if (reports.length === 0) {
        list.innerHTML = '<p style="text-align: center; color: #999; padding: 2rem;">제출된 점검 결과가 없습니다.</p>';
        return;
      }

      const tableHtml = `
        <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
          <thead>
            <tr style="background: var(--secondary-color); text-align: left;">
              <th style="padding: 0.8rem; border-bottom: 2px solid #ddd;">날짜</th>
              <th style="padding: 0.8rem; border-bottom: 2px solid #ddd;">농장</th>
              <th style="padding: 0.8rem; border-bottom: 2px solid #ddd;">총점</th>
              <th style="padding: 0.8rem; border-bottom: 2px solid #ddd;">의견</th>
            </tr>
          </thead>
          <tbody>
            ${reports.map(r => {
              const totalScore = r.results.reduce((acc, curr) => acc + curr.score, 0);
              const maxScoreTotal = items.reduce((acc, curr) => acc + curr.maxScore, 0);
              const date = new Date(r.date).toLocaleDateString();
              return `
                <tr style="border-bottom: 1px solid #eee;">
                  <td style="padding: 0.8rem;">${date}</td>
                  <td style="padding: 0.8rem;"><strong>${r.farm_name}</strong></td>
                  <td style="padding: 0.8rem; color: var(--primary-color); font-weight: bold;">${totalScore} / ${maxScoreTotal}</td>
                  <td style="padding: 0.8rem; font-size: 0.85rem; color: #555;">${r.overall_comment || '-'}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
      list.innerHTML = tableHtml;
    };

    window.deleteUser = async (id) => {
      if(confirm('이 사용자를 삭제하시겠습니까?')) {
        await Storage.deleteUser(id);
        renderUsers();
      }
    };

    window.deleteItem = async (id) => {
      if(confirm('이 점검 항목을 삭제하시겠습니까?')) {
        await Storage.deleteItem(id);
        renderItems();
      }
    };

    document.getElementById('user-form').onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('user-username').value;
      const password = document.getElementById('user-password').value;
      const name = document.getElementById('user-name').value;
      const role = document.getElementById('user-role').value;
      
      const res = await Storage.saveUser({ username, password, name, role });
      if (res.success) {
        e.target.reset();
        renderUsers();
      } else {
        alert(res.message);
      }
    };

    document.getElementById('item-form').onsubmit = async (e) => {
      e.preventDefault();
      const title = document.getElementById('item-title').value;
      const category = document.getElementById('item-category').value;
      const description = document.getElementById('item-desc').value;
      const maxScore = parseInt(document.getElementById('item-max').value);
      await Storage.saveItem({ title, category, description, maxScore });
      e.target.reset();
      renderItems();
    };

    document.getElementById('download-excel').onclick = async () => {
      const reports = await Storage.getReports();
      if (reports.length === 0) {
        alert('다운로드할 데이터가 없습니다.');
        return;
      }

      const items = await Storage.getItems();
      
      const excelData = reports.flatMap(r => {
        const date = new Date(r.date).toLocaleDateString();
        return r.results.map(res => {
          const item = items.find(i => i.id === res.item_id);
          return {
            '날짜': date,
            '농장': r.farm_name,
            '카테고리': item?.category || '-',
            '평가항목': item?.title || '-',
            '점수': res.score,
            '배점': item?.maxScore || '-',
            '결과': res.status === 'PASS' ? '합격' : '불합격',
            '항목의견': res.comment || '',
            '종합의견': r.overall_comment || ''
          };
        });
      });

      const worksheet = XLSX.utils.json_to_sheet(excelData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "InspectionResults");
      XLSX.writeFile(workbook, `AWCFIS_전체결과_${new Date().toISOString().split('T')[0]}.xlsx`);
    };

    renderUsers();
    renderItems();
    renderReports();
  </script>
</body>
</html>
