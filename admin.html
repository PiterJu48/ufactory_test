<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWCFIS - 관리자</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="js/components/app-header.js"></script>
</head>
<body>
  <app-header page-title="관리자 페이지"></app-header>
  
  <main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h1>관리자 대시보드</h1>
      <div style="display: flex; gap: 0.5rem;">
        <span class="badge badge-admin">관리자</span>
        <button id="download-excel" class="btn-outline" style="padding: 0.5rem 1rem;">Excel 추출</button>
      </div>
    </div>

    <!-- Farm Management Section -->
    <section class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2>농장 등록 및 관리</h2>
        <div id="farm-loading" style="display: none; font-size: 0.8rem; color: var(--primary-color);">데이터 처리 중...</div>
      </div>
      <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: #666;">시스템에 등록될 농장 정보를 통합 관리합니다.</p>
      <form id="farm-form">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem;">
          <input type="text" id="farm-name-input" placeholder="농장명 (예: ○○농장)" required>
          <input type="text" id="farm-phone-input" placeholder="연락처 (예: 010-0000-0000)" required>
        </div>
        <div style="display: grid; grid-template-columns: 3fr 1fr; gap: 0.5rem;">
          <input type="text" id="farm-address-input" placeholder="소재지 (지번/도로명 주소)" required>
          <button type="submit" id="farm-submit-btn" class="btn-primary">정보 저장</button>
        </div>
      </form>
      
      <div style="margin-top: 2.5rem; border-top: 1px solid #eee; padding-top: 1.5rem;">
        <h3 style="margin-bottom: 1rem; font-size: 1rem; color: #444;">현재 등록된 농장 현황</h3>
        <div id="farm-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem;">
          <!-- Farm list populated by JS -->
        </div>
      </div>
    </section>

    <div class="grid">
      <!-- Account Management -->
      <section class="card">
        <h2>사용자 권한 관리</h2>
        <p style="margin-bottom: 1rem; font-size: 0.9rem; color: #666;">사용자 계정을 생성하고 접근 권한을 설정합니다.</p>
        <form id="user-form">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
            <input type="text" id="user-username" placeholder="아이디" required>
            <input type="password" id="user-password" placeholder="비밀번호" required>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
            <input type="text" id="user-name" placeholder="성명" required>
            <select id="user-role">
              <option value="INSPECTOR">평가자</option>
              <option value="OWNER">농장 운영자</option>
            </select>
          </div>
          <select id="user-farm-select" style="margin-top: 0.5rem;">
            <option value="">소속 농장 지정 (필요 시)</option>
            <!-- Options populated by JS -->
          </select>
          <button type="submit" id="user-submit-btn" class="btn-primary" style="width: 100%; margin-top: 0.5rem;">계정 생성</button>
        </form>
        
        <div id="user-list" style="margin-top: 1.5rem;">
          <!-- User list populated by JS -->
        </div>
      </section>

      <!-- Official Results Section (Simplified) -->
      <section class="card">
        <h2>공식 점검 결과 내역</h2>
        <div id="report-list" style="overflow-x: auto; margin-top: 1rem;"></div>
      </section>
    </div>
  </main>

  <script type="module">
    import { Storage } from './js/storage.js';

    // Guard
    const currentUser = Storage.getUser();
    if (!currentUser || currentUser.role !== 'ADMIN') {
      alert('관리자 권한이 없습니다.');
      window.location.href = 'index.html';
    }

    let editingFarmId = null;
    let editingUserId = null;

    const renderFarms = async () => {
      const farms = await Storage.getFarms();
      const list = document.getElementById('farm-list');
      const select = document.getElementById('user-farm-select');
      
      list.innerHTML = farms.map(f => {
        const escName = f.name.replace(/'/g, "\\'");
        const escPhone = (f.phone || '').replace(/'/g, "\\'");
        const escAddr = (f.address || '').replace(/'/g, "\\'");
        
        return `
          <div class="card farm-card ${editingFarmId === f.id ? 'editing' : ''}" 
               style="padding: 1rem; margin-bottom: 0; position: relative; cursor: pointer;" 
               onclick="startEditFarm('${f.id}', '${escName}', '${escPhone}', '${escAddr}')">
            <div style="position: absolute; top: 0.5rem; right: 0.5rem; display: flex; gap: 0.5rem;">
              <button onclick="event.stopPropagation(); deleteFarm('${f.id}')" 
                      style="background: none; color: #ccc; padding: 0; font-size: 1.2rem;">&times;</button>
            </div>
            <div style="font-weight: 800; color: var(--primary-color); margin-bottom: 0.3rem;">${f.name}</div>
            <div style="font-size: 0.8rem; color: #666; margin-bottom: 0.2rem;">📞 ${f.phone || '-'}</div>
            <div style="font-size: 0.8rem; color: #666; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3;">📍 ${f.address || '-'}</div>
            <div style="font-size: 0.7rem; color: var(--primary-color); margin-top: 0.5rem; text-align: right;">${editingFarmId === f.id ? '수정 중...' : '클릭하여 수정'}</div>
          </div>
        `;
      }).join('');

      select.innerHTML = '<option value="">소속 농장 지정 (필요 시)</option>' + 
        farms.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
    };

    window.startEditFarm = (id, name, phone, address) => {
      editingFarmId = id;
      document.getElementById('farm-name-input').value = name;
      document.getElementById('farm-phone-input').value = phone;
      document.getElementById('farm-address-input').value = address;
      document.getElementById('farm-submit-btn').textContent = '농장 정보 수정';
      
      if (!document.getElementById('farm-cancel-btn')) {
        const cancelBtn = document.createElement('button');
        cancelBtn.id = 'farm-cancel-btn';
        cancelBtn.type = 'button';
        cancelBtn.className = 'btn-outline';
        cancelBtn.style.marginTop = '0.5rem';
        cancelBtn.style.width = '100%';
        cancelBtn.textContent = '수정 취소';
        cancelBtn.onclick = resetFarmForm;
        document.getElementById('farm-form').appendChild(cancelBtn);
      }
      document.getElementById('farm-form').scrollIntoView({ behavior: 'smooth' });
      renderFarms();
    };

    const resetFarmForm = () => {
      editingFarmId = null;
      document.getElementById('farm-form').reset();
      document.getElementById('farm-submit-btn').textContent = '농장 등록';
      const cancelBtn = document.getElementById('farm-cancel-btn');
      if (cancelBtn) cancelBtn.remove();
      renderFarms();
    };

    const renderUsers = async () => {
      const users = await Storage.getUsers();
      const list = document.getElementById('user-list');
      list.innerHTML = users.map(u => {
        const escName = u.name.replace(/'/g, "\\'");
        return `
          <div class="card user-card ${editingUserId === u.id ? 'editing' : ''}" 
               style="padding: 1rem; margin-bottom: 0.5rem; border: 1px solid #eee; cursor: pointer;" 
               onclick="startEditUser('${u.id}', '${escName}', '${u.role}', '${u.farm_id || ''}')">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
              <div>
                <strong>${u.name}</strong> (@${u.username})
                <span class="badge ${u.role === 'ADMIN' ? 'badge-admin' : (u.role === 'INSPECTOR' ? 'badge-inspector' : 'badge-owner')}">${u.role}</span>
                ${u.farm ? `<div style="font-size: 0.8rem; color: var(--primary-color); margin-top: 0.2rem;">소속: ${u.farm.name}</div>` : ''}
                ${editingUserId === u.id ? `<div style="font-size: 0.7rem; color: var(--primary-color); margin-top: 0.3rem;">수정 중...</div>` : ''}
              </div>
              ${u.role !== 'ADMIN' ? `<button onclick="event.stopPropagation(); deleteUser('${u.id}')" style="background: none; color: #d32f2f; padding: 0;">삭제</button>` : ''}
            </div>
          </div>
        `;
      }).join('');
    };

    window.startEditUser = (id, name, role, farmId) => {
      if (role === 'ADMIN') return;
      
      editingUserId = id;
      document.getElementById('user-name').value = name;
      document.getElementById('user-role').value = role;
      document.getElementById('user-farm-select').value = farmId;
      
      document.getElementById('user-username').disabled = true;
      document.getElementById('user-password').placeholder = "비밀번호 수정 불가";
      document.getElementById('user-password').disabled = true;
      document.getElementById('user-password').required = false;

      document.getElementById('user-submit-btn').textContent = '계정 정보 수정';
      
      if (!document.getElementById('user-cancel-btn')) {
        const cancelBtn = document.createElement('button');
        cancelBtn.id = 'user-cancel-btn';
        cancelBtn.type = 'button';
        cancelBtn.className = 'btn-outline';
        cancelBtn.style.marginTop = '0.5rem';
        cancelBtn.style.width = '100%';
        cancelBtn.textContent = '수정 취소';
        cancelBtn.onclick = resetUserForm;
        document.getElementById('user-form').appendChild(cancelBtn);
      }
      document.getElementById('user-form').scrollIntoView({ behavior: 'smooth' });
      renderUsers();
    };

    const resetUserForm = () => {
      editingUserId = null;
      const form = document.getElementById('user-form');
      form.reset();
      document.getElementById('user-username').disabled = false;
      document.getElementById('user-password').disabled = false;
      document.getElementById('user-password').placeholder = "비밀번호";
      document.getElementById('user-password').required = true;
      
      document.getElementById('user-submit-btn').textContent = '계정 생성';
      const cancelBtn = document.getElementById('user-cancel-btn');
      if (cancelBtn) cancelBtn.remove();
      renderUsers();
    };

    const renderReports = async () => {
      const reports = await Storage.getReports();
      const items = await Storage.getItems();
      const list = document.getElementById('report-list');
      if (reports.length === 0) { list.innerHTML = '<p style="text-align: center; color: #999; padding: 1rem;">내역 없음</p>'; return; }
      const maxScoreTotal = items.reduce((acc, curr) => acc + (curr.max_score || curr.maxScore), 0);
      list.innerHTML = `<table style="width: 100%; text-align: left; font-size: 0.9rem;">
        <tr style="border-bottom: 2px solid #ddd;"><th>날짜</th><th>농장</th><th>점수</th></tr>
        ${reports.map(r => `<tr><td>${new Date(r.date).toLocaleDateString()}</td><td>${r.farm_name}</td><td>${r.results.reduce((acc, curr) => acc + curr.score, 0)} / ${maxScoreTotal}</td></tr>`).join('')}
      </table>`;
    };

    window.deleteFarm = async (id) => { if(confirm('농장을 삭제하시겠습니까?')) { await Storage.deleteFarm(id); await renderFarms(); } };
    window.deleteUser = async (id) => { if(confirm('사용자를 삭제하시겠습니까?')) { await Storage.deleteUser(id); await renderUsers(); } };

    document.getElementById('farm-form').onsubmit = async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('farm-submit-btn');
      const loading = document.getElementById('farm-loading');
      const farmData = {
        name: document.getElementById('farm-name-input').value,
        phone: document.getElementById('farm-phone-input').value,
        address: document.getElementById('farm-address-input').value
      };
      try {
        submitBtn.disabled = true;
        loading.style.display = 'block';
        if (editingFarmId) {
          await Storage.updateFarm(editingFarmId, farmData);
          resetFarmForm();
        } else {
          await Storage.saveFarm(farmData);
          e.target.reset();
        }
        await renderFarms();
      } catch (err) {
        alert('처리 중 오류가 발생했습니다.');
      } finally {
        submitBtn.disabled = false;
        loading.style.display = 'none';
      }
    };

    document.getElementById('user-form').onsubmit = async (e) => {
      e.preventDefault();
      const userData = {
        name: document.getElementById('user-name').value,
        role: document.getElementById('user-role').value,
        farm_id: document.getElementById('user-farm-select').value
      };
      if (editingUserId) {
        const res = await Storage.updateUser(editingUserId, userData);
        if (res.success) {
          resetUserForm();
          renderUsers();
        } else {
          alert(res.message);
        }
      } else {
        const res = await Storage.saveUser({
          username: document.getElementById('user-username').value,
          password: document.getElementById('user-password').value,
          ...userData
        });
        if (res.success) { 
          e.target.reset(); 
          renderUsers(); 
        } else { 
          alert(res.message); 
        }
      }
    };

    document.getElementById('download-excel').onclick = async () => {
      const reports = await Storage.getReports();
      const items = await Storage.getItems();
      const excelData = reports.flatMap(r => r.results.map(res => {
        const item = items.find(i => i.id === res.item_id);
        return { '날짜': new Date(r.date).toLocaleDateString(), '농장': r.farm_name, '카테고리': item?.category || '-', '평가항목': item?.title || '-', '점수': res.score, '결과': res.status === 'PASS' ? '합격' : '불합격' };
      }));
      const ws = XLSX.utils.json_to_sheet(excelData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Reports");
      XLSX.writeFile(wb, "AWCFIS_Results.xlsx");
    };

    renderFarms();
    renderUsers();
    renderReports();
  </script>
</body>
</html>
