<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWCFIS - 평가항목 관리</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="js/components/app-header.js"></script>
</head>
<body>
  <app-header page-title="평가항목 관리"></app-header>
  
  <main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h1>평가 항목 관리</h1>
      <span class="badge badge-admin">시스템 설정</span>
    </div>

    <div class="grid" style="grid-template-columns: 1fr 1.5fr;">
      <!-- Item Registration Form -->
      <section class="card">
        <h2>항목 등록 및 수정</h2>
        <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: #666;">동물복지인증 점검을 위한 공식 평가 지표를 설정합니다.</p>
        <form id="item-form">
          <label style="font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 0.3rem;">평가 분야(카테고리)</label>
          <select id="item-category" required>
            <option value="" disabled selected>카테고리 선택</option>
            <option value="일반기준">일반기준</option>
            <option value="관리자 의무 (10)">관리자 의무 (10)</option>
            <option value="닭의 건강 상태 등 점검(15)">닭의 건강 상태 등 점검(15)</option>
            <option value="건강 관리">건강 관리</option>
            <option value="급이 (20)">급이 (20)</option>
            <option value="급수 준수사항 (5)">급수 준수사항 (5)</option>
            <option value="인도적 도태">인도적 도태</option>
            <option value="사육 시설 등(15)">사육 시설 등(15)</option>
            <option value="사육밀도">사육밀도</option>
            <option value="사육환경(10)">사육환경(10)</option>
            <option value="자동화, 기계화 설비">자동화, 기계화 설비</option>
            <option value="방역 및 청소 (15)">방역 및 청소 (15)</option>
            <option value="가축분뇨 처리">가축분뇨 처리</option>
            <option value="가점사항 (5)">가점사항 (5)</option>
            <option value="눈의 활력과 상태">눈의 활력과 상태</option>
            <option value="깃털의 상태">깃털의 상태</option>
            <option value="발, 발톱, 다리, 서있는 자세, 걸음걸이">발, 발톱, 다리, 서있는 자세, 걸음걸이</option>
            <option value="사료등의 섭취 행동">사료등의 섭취 행동</option>
            <option value="건강 상태">건강 상태</option>
            <option value="합계">합계</option>
          </select>

          <label style="font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 0.3rem; margin-top: 1rem;">평가 항목 명칭</label>
          <input type="text" id="item-title" placeholder="예: 바닥 상태 관리" required>

          <label style="font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 0.3rem; margin-top: 1rem;">세부 평가 기준</label>
          <textarea id="item-desc" placeholder="상세 내용을 입력하세요" rows="4" required></textarea>

          <label style="font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 0.3rem; margin-top: 1rem;">배점(최대 점수)</label>
          <input type="number" id="item-max" placeholder="5" required>

          <button type="submit" id="item-submit-btn" class="btn-primary" style="width: 100%; margin-top: 1rem;">항목 저장</button>
        </form>
      </section>

      <!-- Item List -->
      <section class="card">
        <h2>등록된 평가 항목 목록</h2>
        <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: #666;">현재 시스템에 적용된 평가 지표 현황입니다.</p>
        <div id="item-list" style="max-height: 700px; overflow-y: auto;">
          <!-- Item list populated by JS -->
        </div>
      </section>
    </div>
  </main>

  <script type="module">
    import { Storage } from './js/storage.js';

    // Guard
    const currentUser = Storage.getUser();
    if (!currentUser || currentUser.role !== 'ADMIN') {
      alert('관리자 권한이 없습니다.');
      window.location.href = 'index.html';
    }

    let editingItemId = null;

    const renderItems = async () => {
      const items = await Storage.getItems();
      const list = document.getElementById('item-list');
      
      // Group by category
      const grouped = items.reduce((acc, item) => {
        if (!acc[item.category]) acc[item.category] = [];
        acc[item.category].push(item);
        return acc;
      }, {});

      list.innerHTML = Object.keys(grouped).map(cat => `
        <div style="margin-bottom: 2rem;">
          <h3 style="font-size: 1rem; color: var(--primary-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 0.3rem; margin-bottom: 1rem;">${cat}</h3>
          ${grouped[cat].map(i => {
            const escTitle = i.title.replace(/'/g, "\\'");
            const escDesc = (i.description || '').replace(/'/g, "\\'");
            return `
              <div class="item-card ${editingItemId === i.id ? 'editing' : ''}" 
                   style="padding: 1.2rem; border: 1px solid #dee2e6; border-radius: 4px; margin-bottom: 0.8rem; position: relative; cursor: pointer;" 
                   onclick="startEditItem('${i.id}', '${i.category}', '${escTitle}', '${escDesc}', ${i.max_score || i.maxScore})">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                  <div style="flex: 1;">
                    <div style="font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem;">${i.title}</div>
                    <div style="font-size: 0.85rem; color: #666; line-height: 1.4;">${i.description}</div>
                  </div>
                  <div style="text-align: right; margin-left: 1rem;">
                    <div style="font-weight: 800; color: var(--primary-color); font-size: 1.1rem;">${i.max_score || i.maxScore}점</div>
                    <button onclick="event.stopPropagation(); deleteItem('${i.id}')" 
                            style="background: none; color: #adb5bd; padding: 0.5rem 0 0 0; font-size: 0.8rem; text-decoration: underline;">삭제</button>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `).join('');
    };

    window.startEditItem = (id, category, title, desc, max) => {
      editingItemId = id;
      document.getElementById('item-category').value = category;
      document.getElementById('item-title').value = title;
      document.getElementById('item-desc').value = desc;
      document.getElementById('item-max').value = max;
      
      document.getElementById('item-submit-btn').textContent = '평가 항목 수정 적용';
      
      if (!document.getElementById('item-cancel-btn')) {
        const cancelBtn = document.createElement('button');
        cancelBtn.id = 'item-cancel-btn';
        cancelBtn.type = 'button';
        cancelBtn.className = 'btn-outline';
        cancelBtn.style.marginTop = '0.5rem';
        cancelBtn.style.width = '100%';
        cancelBtn.textContent = '수정 취소';
        cancelBtn.onclick = resetItemForm;
        document.getElementById('item-form').appendChild(cancelBtn);
      }
      document.getElementById('item-form').scrollIntoView({ behavior: 'smooth' });
      renderItems();
    };

    const resetItemForm = () => {
      editingItemId = null;
      document.getElementById('item-form').reset();
      document.getElementById('item-submit-btn').textContent = '항목 저장';
      const cancelBtn = document.getElementById('item-cancel-btn');
      if (cancelBtn) cancelBtn.remove();
      renderItems();
    };

    window.deleteItem = async (id) => {
      if(confirm('이 평가 항목을 삭제하시겠습니까?\n삭제된 항목은 복구할 수 없습니다.')) {
        await Storage.deleteItem(id);
        await renderItems();
      }
    };

    document.getElementById('item-form').onsubmit = async (e) => {
      e.preventDefault();
      const itemData = {
        title: document.getElementById('item-title').value,
        category: document.getElementById('item-category').value,
        description: document.getElementById('item-desc').value,
        max_score: parseInt(document.getElementById('item-max').value)
      };
      
      try {
        if (editingItemId) {
          await Storage.updateItem(editingItemId, itemData);
          alert('수정되었습니다.');
          resetItemForm();
        } else {
          await Storage.saveItem(itemData);
          alert('등록되었습니다.');
          e.target.reset();
        }
        await renderItems();
      } catch (err) {
        alert('오류가 발생했습니다: ' + err.message);
      }
    };

    renderItems();
  </script>
</body>
</html>
