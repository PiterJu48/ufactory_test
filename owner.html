<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWCFIS - 농장주</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="js/components/app-header.js"></script>
</head>
<body>
  <app-header page-title="농장주 페이지"></app-header>
  
  <main class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h1>농가 자가 진단</h1>
      <span class="badge badge-owner">농장 운영자</span>
    </div>

    <div class="grid">
      <!-- Virtual Scoring Form -->
      <section class="card">
        <h3>자가 진단 수행</h3>
        <p style="margin-bottom: 2rem; color: #666; font-size: 0.9rem;">공식 점검 지표를 활용하여 농장의 동물복지 수준을 자율적으로 점검하십시오.</p>
        
        <form id="assessment-form">
          <div id="assessment-items"></div>
          <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">진단 완료 및 저장</button>
        </form>
      </section>

      <!-- History / Results -->
      <aside>
        <section class="card" style="padding: 1.5rem;">
          <h3>최근 진단 이력</h3>
          <div id="history-list" style="margin-top: 1rem;"></div>
        </section>
        
        <div class="card" style="background-color: var(--secondary-color); border: 1px solid #dee2e6;">
          <h4 style="font-size: 0.9rem; color: #333;">안내 사항</h4>
          <p style="font-size: 0.85rem; color: #666; margin-top: 0.5rem; line-height: 1.5;">
            본 자가 진단 결과는 참고용으로만 활용되며, 공식 인증 기록으로 간주되지 않습니다. 실제 점검 전 미흡 사항을 사전에 보완하는 용도로 사용하시기 바랍니다.
          </p>
        </div>
      </aside>
    </div>
  </main>

  <script type="module">
    import { Storage } from './js/storage.js';

    // Guard
    const currentUser = Storage.getUser();
    if (!currentUser || currentUser.role !== 'OWNER') {
      alert('농장주 권한이 없습니다.');
      window.location.href = 'index.html';
    }

    const itemsContainer = document.getElementById('assessment-items');
    const historyList = document.getElementById('history-list');

    const renderAssessmentForm = async () => {
      const items = await Storage.getItems();
      itemsContainer.innerHTML = items.map(item => `
        <div style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #eee;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong style="color: var(--primary-color);">${item.category}</strong>
            <span style="font-size: 0.8rem; color: #999;">최대 ${item.maxScore}점</span>
          </div>
          <p style="margin: 0.3rem 0; font-weight: bold;">${item.title}</p>
          <div style="display: flex; gap: 1rem; align-items: center; margin-top: 0.5rem;">
            <input type="range" name="score_${item.id}" min="0" max="${item.maxScore}" value="0" style="flex: 1; margin-bottom: 0;" oninput="this.nextElementSibling.value = this.value + '점'">
            <output style="width: 40px; font-weight: bold; color: var(--primary-color);">0점</output>
          </div>
        </div>
      `).join('');
    };

    const renderHistory = async () => {
      const history = await Storage.getVirtualReports(currentUser.id);
      const items = await Storage.getItems();
      const maxPossible = items.reduce((acc, curr) => acc + curr.maxScore, 0);

      if (history.length === 0) {
        historyList.innerHTML = '<p style="color: #999; font-size: 0.9rem;">이전 기록이 없습니다.</p>';
        return;
      }
      
      historyList.innerHTML = history.map(h => {
        const total = h.results.reduce((acc, curr) => acc + curr.score, 0);
        const date = new Date(h.date).toLocaleDateString();
        return `
          <div style="padding: 0.8rem; border-bottom: 1px solid #eee; font-size: 0.9rem;">
            <div style="display: flex; justify-content: space-between;">
              <strong>${date}</strong>
              <span style="color: var(--primary-color); font-weight: bold;">${total} / ${maxPossible}</span>
            </div>
          </div>
        `;
      }).join('');
    };

    document.getElementById('assessment-form').onsubmit = async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const items = await Storage.getItems();
      const results = items.map(item => ({
        itemId: item.id,
        score: parseInt(formData.get(`score_${item.id}`))
      }));

      await Storage.saveReport({
        farm_id: currentUser.id,
        is_virtual: 1,
        results
      });

      alert('자가 점검이 저장되었습니다.');
      renderHistory();
    };

    renderAssessmentForm();
    renderHistory();
  </script>
</body>
</html>
